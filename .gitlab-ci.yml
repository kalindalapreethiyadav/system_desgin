variables:
  CI_DEBUG_TRACE: "false"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

include:
  - local: include.yml

stages:
  - pre-rocket
  - build
  - deploy
  - post-deploy

pre-rocket:
  stage: pre-rocket
  script:
    - echo "Deploying to $Enviornment for $Tenant"

build:
  stage: build
  script:
    - echo "Deploying to $Enviornment for $Tenant"

deploy:
  stage: deploy
  script:
    - echo "Deploying to $Enviornment for $Tenant"

post-deploy:
  stage: post-deploy
  script:
    - echo "Completed for $Tenant"