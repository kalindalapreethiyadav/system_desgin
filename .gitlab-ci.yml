sync-to-github:
  stage: sync

  before_script:
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts

  script:
    - git config --global user.name "kalindalapreethiyadav"
    - git config --global user.email "kpreethiyadav579@gmail.com"
    - git remote remove github || true
    - git remote add github git@github.com:kalindalapreethiyadav/system_desgin.git
    - git push github HEAD:$CI_COMMIT_REF_NAME

  only:
    - main

