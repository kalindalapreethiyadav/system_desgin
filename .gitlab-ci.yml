variables:
  CI_DEBUG_TRACE: "false"
  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  CI_REGISTRY_USER: $CI_REGISTRY_USER
  CI_REGISTRY: $CI_REGISTRY
  REGION: $AWS_Region
  Environment: "dev"
  Tenant: "zerohunger"


# workflow:
#   rules:
#     - if: '$CI_PIPELINE_SOURCE == "trigger"'

include:
  - local: include.yml

stages:
  - sync-to-github
  - pre-rocket
  - build
  - deploy
  - post-deploy

before_script:
  - apt-get update -qq
  - apt-get install -y -qq ansible awscli
  - wget -q https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
  - unzip -q terraform_1.6.6_linux_amd64.zip
  - mv terraform /usr/local/bin/
  - terraform version

# Sync GitLab to GitHub Repo
sync-to-github:
  stage: sync-to-github
  image: python:3.11
  variables:
    REPO_DIR: "repo-sync"
  before_script:
    - apt-get update && apt-get install -y git openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - python3 scripts/python/Gitlab-to-Github-SyncRepo.py

pre-rocket:
  stage: pre-rocket
  script:
    - echo "Started pre-rocket stage for $Enviornment for $Tenant"
    # Creation of S3 bucket to store state file
    - echo "Configuring AWS CLI..."
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set default.region $REGION
    - echo "$Environment-$Tenant-bucket"
    - |
        if aws s3api head-bucket --bucket "$Environment-$Tenant-bucket" 2>/dev/null; then
          echo "Bucket already exists. Skipping creation."
        else
          echo "Bucket does not exist. Creating..."

          if [ "$REGION" = "us-east-1" ]; then
            aws s3api create-bucket \
              --bucket "$Environment-$Tenant-bucket"
          else
            aws s3api create-bucket \
              --bucket "$Environment-$Tenant-bucket" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
          fi
          echo "Bucket created."
        fi

    - echo "Creating S3 bucket..."
    - echo "S3 bucket created successfully!"
    # Trigger terraform playbook
    - ansible-playbook pre-rocket/playbook-terraform.yml -e @include.yml
  variables:
    Environment: "dev"
    Tenant: "zerohunger"


build:
  stage: build
  script:
    - echo "Started build stage for $Enviornment for $Tenant"
    - ansible-playbook build/main.yml
  variables:
    CI_REGISTRY: registry.gitlab.com

deploy:
  stage: deploy
  script:
    - echo "Deploying to $Enviornment for $Tenant"
    - echo "Started build stage for $Enviornment for $Tenant"
    - ansible-playbook deploy/main.yml

post-deploy:
  stage: post-deploy
  script:
    - echo "Completed for $Tenant"
    - echo "Started build stage for $Enviornment for $Tenant"
    - ansible-playbook post-deploy/main.yml

