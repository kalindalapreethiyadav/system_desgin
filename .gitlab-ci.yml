include:
  - local: include.yml

stages:
  - pre-rocket
  - build
  - deploy
  - post-deploy

pre-rocket:
  stage: pre-rocket
  script:
    - echo "Started pre-rocket stage for $Enviornment for $Tenant"
    - ansible-playbook /pre-rocket/main.yml

build:
  stage: build
  script:
    - echo "hello"

deploy:
  stage: deploy
  script:
    - echo "Deploying to $Enviornment for $Tenant"

post-deploy:
  stage: post-deploy
  script:
    - echo "Completed for $Tenant"