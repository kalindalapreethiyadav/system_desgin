stages:
  - sync
  - build
  - test
  - deploy

variables:
  GITHUB_USERNAME:
  GITHUB_TOKEN: 
  GITHUB_REPO:

sync-to-github:
  stage: sync
  image: python:3.11
  variables:
      REPO_DIR: "repo-sync"

  before_script:
    - apt-get update && apt-get install -y git
    - git config --global user.email "kpreethiyadav579@gmail.com"
    - git config --global user.name "kalindalapreethiyadav"

  script:
    - echo "Cloning GitLab repo..."
    - git clone $CI_REPOSITORY_URL $REPO_DIR
    - cd $REPO_DIR

    - echo "Adding GitHub remote..."
    - git remote add github https://$GITHUB_USERNAME:$GITHUB_TOKEN@github.com/$GITHUB_USERNAME/$GITHUB_REPO.git || true

    - echo "Pull latest changes..."
    - git pull origin $CI_COMMIT_REF_NAME

    - echo "Push to GitHub..."
    - git push github $CI_COMMIT_REF_NAME --force

  only:
    - main

build:
  stage: build
  script:
    - echo "hello this build"

test:
  stage: test
  script:
    - echo "hello this test"

deploy:
  stage: deploy
  script:
    - echo "hello this deploy"