# Terraform related tasks
- name: Executing terraform tasks
  vars:
    - environment: "dev"
    - cloud_name: "aws"

  tasks:
    - name: terraform init
      command: terraform init
      args:
        chdir: /{{ cloud_name }}/
    
    - name:  terraform plan
      command: terraform plan -out=tfplan
      args:
        chdir: /{{ cloud_name }}/

    - name: terraform apply
      command: terraform apply
      args:
        chdir: /{{ cloud_name }}/
      
