stages:
  - sync
  - build
  - test
  - deploy

variables: 
  terraform_dir: "terraform"
  cloud_name: "aws"

# Sync GitLab to GitHub Repo
sync-to-github:
  stage: sync
  image: python:3.11
  variables:
    REPO_DIR: "repo-sync"

  before_script:
    - apt-get update && apt-get install -y git openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts

  script:
    - python3 ./project-root/scripts/python/Gitlab-to-Github-SyncRepo.py

build:
  stage: build
  script:
    - echo "Running Terraform for ${cloud_name}"
    - ansible-playbook ${terraform_dir}/${cloud_name}/terraform-pipeline.yml

test:
  stage: test
  script:
    - echo "hello this test"

deploy:
  stage: deploy
  script:
    - echo "hello this deploy"