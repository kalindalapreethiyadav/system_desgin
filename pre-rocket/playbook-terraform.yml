---
- name: executing the configurations
  hosts: localhost
  gather_facts: no

  vars:
    env: "{{ lookup('env', 'ENVIRONMENT') }}"
    tenant: "{{ lookup('env', 'TENANT') }}"
    access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"

  environment:
    AWS_ACCESS_KEY_ID: "{{ access_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ secret_key }}"

  tasks:
    - name: testing tasks
      debug:
        msg: "Hello task running ansible"

    - name: Generate terraform.auto.tfvars
      copy:
        dest: terraform/terraform.auto.tfvars
        content: |
          access_key = "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
          secret_key = "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
          region     = "us-east-1"
        
    - name: print current directory
      command: pwd
      register: current_dir
    
    - name: debug PWD
      debug:
        msg: "{{ current_dir.stdout }}"

    - name: print access_key
      debug:
        msg: "{{ access_key }} - and {{ secret_key }}"

    - name: executing terraform init
      command: terraform init -input=false
      args:
        chdir: terraform
      register: tf_init

    - name: Show readable output
      debug:
        msg: "{{ tf_init | to_nice_json }}"

    - name: Executing terraform plan
      command:
        argv:
          - terraform
          - plan
          - -out=plan.tf
      args:
        chdir: terraform
      register: tf_plan

    - name: Show readable output
      debug:
        msg: "{{ tf_plan | to_nice_json }}"

    - name: Executing terraform apply
      command:
        argv:
          - terraform
          - apply
          - -auto-approve
          - plan.tf
      args:
        chdir: terraform
      register: tf_apply
    
    - name:  print terraform apply log
      debug:
        msg: "{{ tf_apply | to_nice_json }}"