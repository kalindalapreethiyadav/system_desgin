---
- name: executing the docker configurations
  hosts: localhost
  gather_facts: no

  environment:
    Environment: "{{ lookup('env', 'ENVIRONMENT') }}"
    Tenant: "{{ lookup('env', 'TENANT') }}"

  tasks:
    - name: testing tasks
      debug:
        msg: "Hello task suning anisble"

    - name: Include Docker setup
      include_tasks: libraries/docker-service.yml
      vars:
        docker_service_state: started
        image_name: "{{ Tenant }}-{{ Environment }}-image"
        build_context: "Hello"
        container_name: "{{ Tenant }}-{{ Environment }}-conatiner"
        container_port: 80

        


